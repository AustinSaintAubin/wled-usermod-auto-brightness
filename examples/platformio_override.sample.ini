# ------------------------------------------------------------------------------
# Sample platformio_override.ini for Auto Brightness (wled-usermod-auto-brightness)
# Version 1.0.0  ·  Updated 2026-07-12  ·  Austin St. Aubin <austinsaintaubin@gmail.com>
# ------------------------------------------------------------------------------
# Copy to the WLED repo root as `platformio_override.ini` and adjust to taste.
# It merges on top of platformio.ini. Build the env below:
#   esp32dev_auto_brightness        (USB/serial upload)
#   esp32dev_auto_brightness_ota    (over-the-air upload)
#
# Drives WLED's overall brightness from ambient light: BH1750FVI or VEML7700
# (I2C, selectable or auto-detected) or an analog photocell/LDR on an ADC pin.
# Configure it on the Usermods settings page once flashed.
# ------------------------------------------------------------------------------

[platformio]
default_envs = esp32dev_auto_brightness

[env:esp32dev_auto_brightness]
extends = env:esp32dev          ; inherits board, platform, partitions, lib_deps

# This usermod, pulled in out-of-tree by git URL — PlatformIO fetches it automatically and
# the "wled-" library name is auto-recognized as a usermod (no copy / no submodule). Pin a
# release with #v1.0.4 instead of #main if you prefer a fixed version. We deliberately do NOT
# inherit ${env:esp32dev.custom_usermods} (which defaults to "audioreactive" + arduinoFFT).
custom_usermods = https://github.com/AustinSaintAubin/wled-usermod-auto-brightness.git#main
# Want the companion environmental-sensor usermod (HTU21D/BMP180/BH1750 readings) too?
# Use the multiline form (one entry per indented line — mixing a bare name and a URL on
# one line breaks parsing). Both usermods can share the same I2C bus / BH1750:
# custom_usermods =
#   https://github.com/AustinSaintAubin/wled-usermod-auto-brightness.git#main
#   https://github.com/AustinSaintAubin/wled-usermod-sensors-i2c.git#main
# For local development, point at a checkout instead of fetching from git:
# custom_usermods = symlink:///absolute/path/to/wled-usermod-auto-brightness

# Build from the same bases esp32dev uses, and set WLED_RELEASE_NAME ourselves
# (avoids the duplicate-define warning from re-including ${env:esp32dev.build_flags}).
build_flags = ${common.build_flags} ${esp32_idf_V4.build_flags}
  -DARDUINO_USB_CDC_ON_BOOT=0          ; mandatory for "classic" ESP32
  -D WLED_RELEASE_NAME=\"auto_brightness_esp32\"

  ; --- I2C pins (required for the I2C sources — BH1750 / VEML7700 / Auto; an
  ; Analog-only build doesn't need them). These are the classic ESP32 defaults —
  ; change to match your wiring. Without I2C pins the usermod disables itself
  ; unless Source is set to Analog. You can also set these later in
  ; Config -> LED Preferences. ---
  -D I2CSDAPIN=21
  -D I2CSCLPIN=22
  -D HW_PIN_SDA=21                     ; informs the WebUI of the default pins
  -D HW_PIN_SCL=22

  ; --- SIZE: drop features this usermod never uses (frees flash) ---
  -D WLED_DISABLE_INFRARED             ; drops the large IRremoteESP8266 code
  -D WLED_DISABLE_ESPNOW               ; drops QuickEspNow (no WizMote/sync)
  ; -D WLED_DISABLE_ALEXA
  ; -D WLED_DISABLE_HUESYNC

  ; --- WiFi (OPTIONAL): baking creds in is convenient but extractable from the .bin.
  ; Leave commented to provision via the WLED-AP captive portal instead. ---
  ; -D CLIENT_SSID='"your-ssid"'
  ; -D CLIENT_PASS='"your-password"'

  ; --- OTA security (OPTIONAL): sets the OTA-Lock passphrase AND defaults to OTA-LOCKED.
  ; Only applied to a FRESH/erased config. ---
  ; -D WLED_OTA_PASS=\"CHANGE_ME_strong_pass\"

  ; Compile ArduinoOTA on by default (still blocked while OTA-locked):
  -D WLED_ENABLE_AOTA

  ; --- MQTT / Home Assistant: enabled by default. The usermod publishes the lux
  ; value + an Auto Brightness switch with HA auto-discovery when MQTT is
  ; configured (it also runs fine without MQTT). Uncomment to drop MQTT entirely
  ; and save ~15-20 KB flash. ---
  ; -D WLED_DISABLE_MQTT

  ; --- MORE headroom, only if you add usermods later and overflow flash ---
  ; -D WLED_DISABLE_PARTICLESYSTEM1D
  ; -D WLED_DISABLE_PARTICLESYSTEM2D

# ------------------------------------------------------------------------------
# OTA (over-the-air) upload variant. Reuses the build above; only upload changes.
# In WLED first: Security & Updates -> untick "OTA Lock", tick "Enable ArduinoOTA",
# Save, reboot. WLED sets no ArduinoOTA password, so no --auth is needed.
# ------------------------------------------------------------------------------
[env:esp32dev_auto_brightness_ota]
extends = env:esp32dev_auto_brightness
upload_protocol = espota
upload_port = wled-autobri.local      ; <-- your device's IP or mDNS name
